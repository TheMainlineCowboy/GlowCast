name: GlowCast CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: glowcast-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Clean install, smoke, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --progress=false

      - name: Run full CI gate
        run: npm run ci
