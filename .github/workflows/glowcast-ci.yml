name: GlowCast CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: glowcast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Clean install, smoke, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --progress=false

      - name: Prepare source exactly once
        run: npm run prep && node scripts/patch-fallback-edge-strength-v1.mjs && node scripts/patch-fallback-cluster-length-awareness-v1.mjs && node scripts/patch-fallback-direction-aware-jitter-v1.mjs && node scripts/patch-fallback-strength-coherent-jitter-v1.mjs

      - name: Detector connectivity smoke
        run: node scripts/smoke-detector-connectivity.mjs

      - name: Synthetic broken-corner frame smoke
        shell: bash
        run: |
          set -o pipefail
          node scripts/smoke-detector-synthetic-frame.mjs broken-corner 2>&1 | tee synthetic-broken-corner.log

      - name: Synthetic thin-gap frame smoke
        run: node scripts/smoke-detector-synthetic-frame.mjs thin-gap

      - name: Synthetic open-fragment rejection smoke
        run: node scripts/smoke-detector-synthetic-frame.mjs l-fragment

      - name: Mask adapter smoke
        run: node scripts/smoke-mask-adapter.mjs

      - name: Strength-aware nested perimeter smoke
        run: node scripts/smoke-fallback-nested-continuous-coverage-runtime.mjs

      - name: Strength-confidence nested perimeter smoke
        run: node scripts/smoke-fallback-strength-confidence-runtime.mjs

      - name: Length-aware cluster authority smoke
        run: node scripts/smoke-fallback-cluster-length-awareness-runtime.mjs

      - name: Direction-aware jitter smoke
        run: node scripts/smoke-fallback-direction-aware-jitter-runtime.mjs

      - name: Strength-coherent jitter smoke
        run: node scripts/smoke-fallback-strength-coherent-jitter-runtime.mjs

      - name: Fallback adapter replacement smoke
        run: node scripts/smoke-fallback-adapter-replacement.mjs

      - name: Satellite merge smoke
        run: node scripts/smoke-satellite-merge-behavior.mjs

      - name: Candidate detection smoke
        shell: bash
        run: |
          set -o pipefail
          node scripts/smoke-run-candidate-detection.mjs 2>&1 | tee candidate-detection.log

      - name: UI wiring smoke
        run: node scripts/smoke-ui-auto-detect-wiring.mjs

      - name: Fallback duplicate smoke
        run: node scripts/smoke-fallback-duplicate-source.mjs

      - name: Satellite merge source smoke
        run: node scripts/smoke-satellite-merge-gate-source.mjs

      - name: Outer-frame preference source smoke
        run: node scripts/smoke-outer-frame-preference-source.mjs

      - name: Nested-detail selection source smoke
        run: node scripts/smoke-nested-detail-selection-source.mjs

      - name: Aligned satellite grouping source smoke
        run: node scripts/smoke-aligned-satellite-grouping-source.mjs

      - name: Bounded satellite span source smoke
        run: node scripts/smoke-bounded-satellite-span-source.mjs

      - name: Bounded satellite growth source smoke
        run: node scripts/smoke-bounded-satellite-growth-source.mjs

      - name: TypeScript check
        run: npx tsc

      - name: Vite production build
        env:
          GITHUB_PAGES: "true"
        run: npx vite build

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Upload detector diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detector-diagnostic
          path: |
            synthetic-frame-diagnostic.json
            synthetic-broken-corner.log
            candidate-detection.log
          if-no-files-found: error
          retention-days: 3

  deploy-pages:
    name: Deploy GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify live GitHub Pages site
        shell: bash
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          test -n "$PAGE_URL"

          for attempt in {1..12}; do
            if curl --fail --silent --show-error --location \
              --connect-timeout 10 --max-time 30 \
              "$PAGE_URL" --output /tmp/glowcast-index.html; then
              break
            fi

            if [ "$attempt" -eq 12 ]; then
              echo "GlowCast Pages site did not become reachable: $PAGE_URL" >&2
              exit 1
            fi

            sleep 10
          done

          grep --fixed-strings --quiet '<title>GlowCast' /tmp/glowcast-index.html
          grep --fixed-strings --quiet 'id="root"' /tmp/glowcast-index.html
          grep --extended-regexp --quiet 'src="[^"]*assets/[^"]+\.js"' /tmp/glowcast-index.html
